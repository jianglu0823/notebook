<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Superbook · Logo 方案画廊</title>
<style>
  :root{
    --bg:#0e1417; --panel:#151d21; --panel2:#1d272c; --line:#2a373d; --line-strong:#3a4a52;
    --fg:#e8edef; --mut:#8a9ba3; --accent:#2dd4bf; --accent2:#22a3d6; --warn:#fbbf24;
    --err:#f87171; --violet:#8b5cf6; --pink:#ec4899; --lime:#a3e635; --orange:#fb923c;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--fg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;-webkit-font-smoothing:antialiased;padding:40px 24px 80px;}
  h1{font-size:26px;font-weight:800;letter-spacing:.3px;margin:0 0 6px;}
  .sub{color:var(--mut);font-size:14px;margin-bottom:8px;}
  .hint{color:var(--mut);font-size:13px;margin-bottom:32px;line-height:1.7;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 18px;max-width:720px;}
  .hint b{color:var(--accent);}
  .toggle{margin:0 0 28px;display:flex;gap:8px;}
  .toggle button{background:var(--panel2);border:1px solid var(--line);color:var(--fg);padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;}
  .toggle button.on{background:var(--accent);color:#04231f;border-color:transparent;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px;max-width:1200px;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:24px 20px 18px;display:flex;flex-direction:column;align-items:center;gap:16px;transition:border-color .2s,transform .2s;}
  .card:hover{border-color:var(--accent);transform:translateY(-3px);}
  .stage{height:120px;display:flex;align-items:center;justify-content:center;width:100%;}
  .brandrow{display:flex;align-items:center;gap:11px;}
  .brandrow .name{font-size:20px;font-weight:800;}
  .no{position:absolute;}
  .meta{text-align:center;}
  .meta .tag{display:inline-block;background:var(--panel2);border:1px solid var(--line);color:var(--accent);font-size:11px;font-weight:700;padding:2px 10px;border-radius:20px;margin-bottom:8px;letter-spacing:.4px;}
  .meta .t{font-size:15px;font-weight:700;margin-bottom:4px;}
  .meta .d{font-size:12px;color:var(--mut);line-height:1.6;}
  .idx{font-size:12px;color:var(--mut);font-weight:700;}
  body.light{--bg:#f6f8f9;--panel:#fff;--panel2:#eef2f4;--line:#dce3e6;--line-strong:#c3cdd2;--fg:#16232a;--mut:#5f7079;}
  .gname{background:linear-gradient(92deg,var(--fg),var(--accent));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
</style>
</head>
<body>
<h1>Superbook · Logo 方案画廊</h1>
<div class="sub">12 个大胆 / 个性化方向 · 全部内联 SVG,可直接搬进项目</div>
<div class="hint">挑中哪个(或哪几个的组合、想微调哪里)告诉我编号即可,例如 <b>「7 号,但字母换成 SB」</b>。点右上按钮可切换<b>明 / 暗背景</b>预览适配效果。</div>
<div class="toggle">
  <button class="on" onclick="setTheme('dark',this)">暗色背景</button>
  <button onclick="setTheme('light',this)">亮色背景</button>
</div>
<div class="grid" id="grid"></div>

<script>
function setTheme(t,btn){document.body.classList.toggle('light',t==='light');document.querySelectorAll('.toggle button').forEach(b=>b.classList.remove('on'));btn.classList.add('on');}

// 每个方案:{tag, title, desc, svg, showName(是否在旁边配 Superbook 字样)}
const logos = [
{tag:'字母徽标',title:'01 · 立体 S 书脊',desc:'字母 S 由两片错位书页构成,兼具「书」与「S」双关。渐变实心,现代 app 图标感。',svg:`
<svg viewBox="0 0 64 64" width="72" height="72">
  <defs><linearGradient id="g1" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2dd4bf"/><stop offset="1" stop-color="#22a3d6"/></linearGradient></defs>
  <rect x="6" y="6" width="52" height="52" rx="15" fill="url(#g1)"/>
  <path d="M42 22c-3-3-9-4-13-2-4 2-4 7 0 9l8 3c4 2 3 7-1 8-4 2-10 1-13-3" fill="none" stroke="#04231f" stroke-width="4.4" stroke-linecap="round"/>
</svg>`},

{tag:'极简几何',title:'02 · 环形开口书',desc:'一个圆环缺口 + 内部开页,Linear/Vercel 式极简。线条克制,放大缩小都清晰。',svg:`
<svg viewBox="0 0 64 64" width="72" height="72">
  <circle cx="32" cy="32" r="24" fill="none" stroke="#2dd4bf" stroke-width="4" stroke-dasharray="118 40" stroke-linecap="round" transform="rotate(-45 32 32)"/>
  <path d="M32 20c-4-3-9-3-12-1v22c3-2 8-2 12 1 4-3 9-3 12-1V19c-3-2-8-2-12 1Z" fill="none" stroke="#2dd4bf" stroke-width="3.4" stroke-linejoin="round"/>
  <line x1="32" y1="21" x2="32" y2="43" stroke="#2dd4bf" stroke-width="3.4"/>
</svg>`},

{tag:'霓虹赛博',title:'03 · 霓虹发光书',desc:'高饱和青绿 + 洋红双色描边,强发光。夜店/赛博氛围,极具冲击力和记忆点。',svg:`
<svg viewBox="0 0 64 64" width="72" height="72">
  <defs><filter id="glow"><feGaussianBlur stdDeviation="1.6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <g filter="url(#glow)">
    <path d="M32 18c-5-3-12-3-16-1v28c4-2 11-2 16 1 5-3 12-3 16-1V17c-4-2-11-2-16 1Z" fill="none" stroke="#2dd4bf" stroke-width="2.6" stroke-linejoin="round"/>
    <path d="M32 18v27" stroke="#ec4899" stroke-width="2.6"/>
    <path d="M22 26h6M22 32h6M36 26h6M36 32h6" stroke="#ec4899" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>`},

{tag:'粗野主义',title:'04 · Brutalist 黑块',desc:'超粗黑描边 + 硬阴影错位,brutalism 风。够狂、够个性,适合想张扬的品牌。',svg:`
<svg viewBox="0 0 64 64" width="72" height="72">
  <rect x="16" y="18" width="30" height="30" rx="2" fill="#2dd4bf"/>
  <rect x="12" y="14" width="30" height="30" rx="2" fill="var(--bg)" stroke="#e8edef" stroke-width="4"/>
  <path d="M20 22h14M20 29h14M20 36h9" stroke="#e8edef" stroke-width="3.4" stroke-linecap="round"/>
</svg>`},

{tag:'等距 3D',title:'05 · Isometric 立体书',desc:'2.5D 等距立体书,双色面区分光影,有体积感和高级质感,像精致 3D 图标。',svg:`
<svg viewBox="0 0 64 64" width="72" height="72">
  <path d="M32 14 54 26 32 38 10 26Z" fill="#5eead4"/>
  <path d="M10 26 32 38v14L10 40Z" fill="#14b8a6"/>
  <path d="M54 26 32 38v14l22-12Z" fill="#0d9488"/>
  <path d="M32 14 54 26 32 38 10 26Z" fill="none" stroke="#04231f" stroke-width="1.5" stroke-linejoin="round" opacity=".3"/>
</svg>`},

{tag:'对话气泡',title:'06 · 书=对话气泡',desc:'把书页轮廓和对话气泡合体,直点「基于资料问答」的产品内核。青绿主色。',svg:`
<svg viewBox="0 0 64 64" width="72" height="72">
  <path d="M14 16h36a4 4 0 0 1 4 4v22a4 4 0 0 1-4 4H30l-10 8v-8h-6a4 4 0 0 1-4-4V20a4 4 0 0 1 4-4Z" fill="none" stroke="#2dd4bf" stroke-width="3.2" stroke-linejoin="round"/>
  <path d="M32 22c-3-2-7-2-10-1v18c3-1 7-1 10 1 3-2 7-2 10-1V21c-3-1-7-1-10 1Z" fill="#2dd4bf"/>
</svg>`},

{tag:'纸飞机',title:'07 · 书页纸飞机',desc:'翻开的书页折成纸飞机剪影,寓意「知识起飞 / 轻盈」。渐变 + 一抹高光,独特有记忆点。',svg:`
<svg viewBox="0 0 64 64" width="72" height="72">
  <defs><linearGradient id="g7" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5eead4"/><stop offset="1" stop-color="#22a3d6"/></linearGradient></defs>
  <path d="M12 20 52 14 30 52 26 38Z" fill="url(#g7)"/>
  <path d="M12 20 26 38 52 14Z" fill="#04231f" opacity=".22"/>
  <path d="M26 38 30 52 36 40" fill="none" stroke="#04231f" stroke-width="1.6" opacity=".3" stroke-linejoin="round"/>
</svg>`},

{tag:'字母组合',title:'08 · SB 单色组合',desc:'S 与 B 巧妙连写成一个整体字标,纯字体方案,极简、专业、易识别,像成熟 SaaS 品牌。',svg:`
<svg viewBox="0 0 64 64" width="72" height="72">
  <path d="M40 22c-3-3-9-4-13-2-4 2-4 6 0 8l7 3c4 2 4 6 0 8-4 2-10 1-13-2" fill="none" stroke="#2dd4bf" stroke-width="4" stroke-linecap="round"/>
  <path d="M40 16v32M40 16h8c4 0 6 3 6 6s-2 6-6 6h-8M40 32h9c4 0 7 3 7 7s-3 7-7 7h-9" fill="none" stroke="#e8edef" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity=".9"/>
</svg>`},

{tag:'知识星闪',title:'09 · 书 + 四角星',desc:'书本一角迸出一颗四角星(AI「智能/灵感」通用符号),弱化能量感、突出智能问答。',svg:`
<svg viewBox="0 0 64 64" width="72" height="72">
  <path d="M14 20c6-3 14-3 18 1 4-4 12-4 18-1v26c-6-3-14-3-18 1-4-4-12-4-18-1Z" fill="none" stroke="#2dd4bf" stroke-width="3.2" stroke-linejoin="round"/>
  <path d="M32 21v26" stroke="#2dd4bf" stroke-width="3.2"/>
  <path d="M47 12c.6 4 1.6 5 5.5 5.5-3.9.6-4.9 1.6-5.5 5.5-.6-3.9-1.6-4.9-5.5-5.5 3.9-.5 4.9-1.5 5.5-5.5Z" fill="#fbbf24"/>
</svg>`},

{tag:'负空间',title:'10 · 负空间闪电书',desc:'实心青绿书本,中间用「挖空」的负空间藏一道闪电,不靠撞色也有能量感,聪明克制。',svg:`
<svg viewBox="0 0 64 64" width="72" height="72">
  <path d="M14 18c6-3 14-3 18 1 4-4 12-4 18-1v28c-6-3-14-3-18 1-4-4-12-4-18-1Z" fill="#2dd4bf"/>
  <path d="M34 22 26 34h5l-2 9 9-13h-5l2-8Z" fill="var(--bg)"/>
</svg>`},

{tag:'编辑光标',title:'11 · 书 + 文本光标',desc:'书页 + 闪烁文本光标「|」,强调「可编辑/创作」。极简线条,工具属性强。',svg:`
<svg viewBox="0 0 64 64" width="72" height="72">
  <path d="M14 20c6-3 13-3 17 1V47c-4-4-11-4-17-1Z" fill="none" stroke="#2dd4bf" stroke-width="3.2" stroke-linejoin="round"/>
  <path d="M50 20c-6-3-13-3-17 1V47c4-4 11-4 17-1Z" fill="none" stroke="#2dd4bf" stroke-width="3.2" stroke-linejoin="round" opacity=".5"/>
  <line x1="40" y1="26" x2="40" y2="42" stroke="#fbbf24" stroke-width="3.4" stroke-linecap="round"/>
  <path d="M37 26h6M37 42h6" stroke="#fbbf24" stroke-width="2.4" stroke-linecap="round"/>
</svg>`},

{tag:'渐变光斑',title:'12 · 弥散渐变方块',desc:'圆角方块内弥散彩色光晕 + 极简白书线稿。现代、柔和、时髦,类 iOS/Notion 新拟态。',svg:`
<svg viewBox="0 0 64 64" width="72" height="72">
  <defs>
    <linearGradient id="g12" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2dd4bf"/><stop offset=".5" stop-color="#22a3d6"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient>
    <radialGradient id="s12" cx=".3" cy=".25" r=".9"><stop offset="0" stop-color="#fff" stop-opacity=".55"/><stop offset="1" stop-color="#fff" stop-opacity="0"/></radialGradient>
  </defs>
  <rect x="6" y="6" width="52" height="52" rx="16" fill="url(#g12)"/>
  <rect x="6" y="6" width="52" height="52" rx="16" fill="url(#s12)"/>
  <path d="M22 22c4-2 7-2 10 0 3-2 6-2 10 0v20c-4-2-7-2-10 0-3-2-6-2-10 0Z" fill="none" stroke="#fff" stroke-width="3" stroke-linejoin="round"/>
  <path d="M32 22v20" stroke="#fff" stroke-width="3"/>
</svg>`},
];

const grid = document.getElementById('grid');
grid.innerHTML = logos.map(l=>`
  <div class="card">
    <div class="stage">
      <div class="brandrow">${l.svg}<span class="name gname">Superbook</span></div>
    </div>
    <div class="meta">
      <span class="tag">${l.tag}</span>
      <div class="t">${l.title}</div>
      <div class="d">${l.desc}</div>
    </div>
  </div>`).join('');
</script>
</body>
</html>
