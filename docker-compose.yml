name: llm-note

services:
  # ---------- Nacos: 配置 + 注册中心 ----------
  nacos:
    image: nacos/nacos-server:v2.4.3
    container_name: nblm-nacos
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - nacos_data:/home/nacos/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ---------- MySQL: 元数据 ----------
  mysql:
    image: mysql:8.0
    container_name: nblm-mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-time-zone=+08:00
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infra/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ---------- Redis: 缓存 / 会话 ----------
  redis:
    image: redis:7.2
    container_name: nblm-redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ---------- Milvus 依赖: etcd ----------
  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.16
    container_name: nblm-milvus-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: etcd -advertise-client-urls=http://milvus-etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    volumes:
      - etcd_data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 5
    restart: unless-stopped

  # ---------- Milvus 依赖: minio(对象存储) ----------
  milvus-minio:
    image: minio/minio:RELEASE.2024-05-28T17-19-04Z
    container_name: nblm-milvus-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data --console-address ":9001"
    volumes:
      - minio_data:/minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 5
    restart: unless-stopped

  # ---------- Milvus: 向量库(standalone) ----------
  milvus:
    image: milvusdb/milvus:v2.4.15
    container_name: nblm-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      milvus-etcd:
        condition: service_healthy
      milvus-minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 10
      start_period: 90s
    restart: unless-stopped

  # ---------- notebooklm-app: 单体应用(全部功能) ----------
  app:
    image: nblm-app:prebuilt
    build:
      context: .
      dockerfile: notebooklm-app/Dockerfile
    container_name: nblm-app
    environment:
      TZ: Asia/Shanghai
      APP_PORT: "8080"
      NACOS_ADDR: nacos:8848
      NACOS_USERNAME: ${NACOS_AUTH_IDENTITY_VALUE:-nacos}
      NACOS_PASSWORD: ${NACOS_AUTH_IDENTITY_VALUE:-nacos}
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      MILVUS_HOST: milvus
      MILVUS_PORT: "19530"
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-prod-at-least-32-bytes-long-secret}
      UPLOAD_DIR: /data/uploads
      AUDIO_DIR: /data/audio
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - app_data:/data
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
    restart: unless-stopped

  # ---------- gateway: Spring Cloud Gateway ----------
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: nblm-gateway
    environment:
      GATEWAY_PORT: "8090"
      NACOS_ADDR: nacos:8848
      NACOS_USERNAME: ${NACOS_AUTH_IDENTITY_VALUE:-nacos}
      NACOS_PASSWORD: ${NACOS_AUTH_IDENTITY_VALUE:-nacos}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "${GATEWAY_PORT:-9000}:8090"
    depends_on:
      nacos:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_started
    restart: unless-stopped

volumes:
  nacos_data:
  mysql_data:
  redis_data:
  etcd_data:
  minio_data:
  milvus_data:
  app_data:

