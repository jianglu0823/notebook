<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Superbook · 鹿主题 Logo 画廊</title>
<style>
  :root{
    --bg:#0e1417; --panel:#151d21; --panel2:#1d272c; --line:#2a373d; --line-strong:#3a4a52;
    --fg:#e8edef; --mut:#8a9ba3; --accent:#2dd4bf; --accent2:#22a3d6; --warn:#fbbf24;
    --err:#f87171; --violet:#8b5cf6; --pink:#ec4899; --lime:#a3e635; --orange:#fb923c; --gold:#e8c07d;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--fg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;-webkit-font-smoothing:antialiased;padding:40px 24px 80px;}
  h1{font-size:26px;font-weight:800;letter-spacing:.3px;margin:0 0 6px;}
  .sub{color:var(--mut);font-size:14px;margin-bottom:8px;}
  .hint{color:var(--mut);font-size:13px;margin-bottom:32px;line-height:1.7;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 18px;max-width:720px;}
  .hint b{color:var(--accent);}
  .toggle{margin:0 0 28px;display:flex;gap:8px;}
  .toggle button{background:var(--panel2);border:1px solid var(--line);color:var(--fg);padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;}
  .toggle button.on{background:var(--accent);color:#04231f;border-color:transparent;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px;max-width:1200px;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:24px 20px 18px;display:flex;flex-direction:column;align-items:center;gap:16px;transition:border-color .2s,transform .2s;}
  .card:hover{border-color:var(--accent);transform:translateY(-3px);}
  .stage{height:120px;display:flex;align-items:center;justify-content:center;width:100%;}
  .brandrow{display:flex;align-items:center;gap:11px;}
  .brandrow .name{font-size:20px;font-weight:800;}
  .meta{text-align:center;}
  .meta .tag{display:inline-block;background:var(--panel2);border:1px solid var(--line);color:var(--accent);font-size:11px;font-weight:700;padding:2px 10px;border-radius:20px;margin-bottom:8px;letter-spacing:.4px;}
  .meta .t{font-size:15px;font-weight:700;margin-bottom:4px;}
  .meta .d{font-size:12px;color:var(--mut);line-height:1.6;}
  body.light{--bg:#f6f8f9;--panel:#fff;--panel2:#eef2f4;--line:#dce3e6;--line-strong:#c3cdd2;--fg:#16232a;--mut:#5f7079;}
  .gname{background:linear-gradient(92deg,var(--fg),var(--accent));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
</style>
</head>
<body>
<h1>Superbook · 鹿主题 Logo 画廊</h1>
<div class="sub">10 个以「鹿」为主体的方向 · 从极简线稿到大胆异想 · 全部内联 SVG</div>
<div class="hint">这一批全部围绕 <b>鹿(鹿角 / 鹿头 / 鹿身)</b> 展开,并尽量融入「书 / 知识 / 页面」的隐喻。挑中告诉我编号即可,例如 <b>「D3,鹿角再对称一点」</b>。右上可切换<b>明 / 暗背景</b>。</div>
<div class="toggle">
  <button class="on" onclick="setTheme('dark',this)">暗色背景</button>
  <button onclick="setTheme('light',this)">亮色背景</button>
</div>
<div class="grid" id="grid"></div>

<script>
function setTheme(t,btn){document.body.classList.toggle('light',t==='light');document.querySelectorAll('.toggle button').forEach(b=>b.classList.remove('on'));btn.classList.add('on');}

const logos = [
{tag:'极简线稿',title:'D1 · 几何鹿头',desc:'用最少的直线勾出正面鹿头 + 对称鹿角,单色描边。冷静、克制、易识别,像高端品牌 monogram。',svg:`
<svg viewBox="0 0 64 64" width="76" height="76">
  <g fill="none" stroke="#2dd4bf" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M32 30 24 46h16z"/>
    <path d="M26 30c-4-2-6-6-6-10M26 22c-4 0-7-2-9-5M20 20c-3 1-6 0-8-3"/>
    <path d="M38 30c4-2 6-6 6-10M38 22c4 0 7-2 9-5M44 20c3 1 6 0 8-3"/>
    <circle cx="32" cy="34" r="1.6" fill="#2dd4bf" stroke="none"/>
  </g>
</svg>`},

{tag:'鹿角=书',title:'D2 · 鹿角托开书',desc:'一对鹿角托起一本翻开的书,直接把「鹿」与「书」合体。渐变书页,主题呼应最强。',svg:`
<svg viewBox="0 0 64 64" width="76" height="76">
  <defs><linearGradient id="gd2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5eead4"/><stop offset="1" stop-color="#22a3d6"/></linearGradient></defs>
  <g fill="none" stroke="#2dd4bf" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M20 40c-5-3-8-9-8-16M20 32c-5-1-9-5-11-11M12 26c-4 0-7-3-8-7"/>
    <path d="M44 40c5-3 8-9 8-16M44 32c5-1 9-5 11-11M52 26c4 0 7-3 8-7"/>
  </g>
  <path d="M32 34c-4-3-9-3-13-1v18c4-2 9-2 13 1 4-3 9-3 13-1V33c-4-2-9-2-13 1Z" fill="url(#gd2)"/>
  <path d="M32 34v18" stroke="#04231f" stroke-width="1.6" opacity=".4"/>
</svg>`},

{tag:'徽章纹章',title:'D3 · 盾形鹿纹章',desc:'盾牌徽章里嵌鹿头剪影,学院 / 出版社气质,庄重有传承感,适合走「知识殿堂」调性。',svg:`
<svg viewBox="0 0 64 64" width="76" height="76">
  <path d="M32 6 54 12v20c0 14-10 22-22 26C20 54 10 46 10 32V12Z" fill="none" stroke="#2dd4bf" stroke-width="3" stroke-linejoin="round"/>
  <g fill="#2dd4bf">
    <path d="M32 40c-2 0-4-1-5-3l-3-6c3 1 5 1 8 1s5 0 8-1l-3 6c-1 2-3 3-5 3Z"/>
    <path d="M27 32c-3-2-5-5-5-9 2 2 4 3 6 3zM37 32c3-2 5-5 5-9-2 2-4 3-6 3z"/>
  </g>
</svg>`},

{tag:'负空间',title:'D4 · 书中negative鹿',desc:'实心青绿圆角块,用挖空的负空间同时藏「鹿头」与「书脊」,聪明、耐看、不撞色。',svg:`
<svg viewBox="0 0 64 64" width="76" height="76">
  <rect x="6" y="6" width="52" height="52" rx="15" fill="#2dd4bf"/>
  <g fill="var(--bg)">
    <path d="M32 26c-3 0-5 2-5 5s2 8 5 10c3-2 5-7 5-10s-2-5-5-5Z"/>
    <path d="M27 24c-3-2-4-5-4-9 2 2 3 3 5 3zM37 24c3-2 4-5 4-9-2 2-3 3-5 3z"/>
  </g>
</svg>`},

{tag:'大胆异想',title:'D5 · 鹿角长成树/书页',desc:'鹿角枝桠末端绽开成书页与叶片,超现实、诗意、有故事感。个性强、记忆点高。',svg:`
<svg viewBox="0 0 64 64" width="76" height="76">
  <g fill="none" stroke="#2dd4bf" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M32 52V30"/>
    <path d="M32 34c-6-2-10-7-11-14M32 30c6-2 10-7 11-14"/>
    <path d="M21 20c-4-1-6-4-7-8M43 20c4-1 6-4 7-8"/>
  </g>
  <g fill="#2dd4bf">
    <path d="M14 12c-3-1-5 1-5 4 3 0 5-1 5-4ZM21 20c-2-3-1-6 2-7 1 3 0 5-2 7ZM50 12c3-1 5 1 5 4-3 0-5-1-5-4ZM43 20c2-3 1-6-2-7-1 3 0 5 2 7Z"/>
    <path d="M32 30c-3-2-5-5-5-9 3 1 5 4 5 9ZM32 30c3-2 5-5 5-9-3 1-5 4-5 9Z" opacity=".85"/>
  </g>
</svg>`},

{tag:'字母融合',title:'D6 · S 形鹿角',desc:'首字母 S 的曲线自然长出鹿角分叉,字标 + 图形二合一,极简又暗藏巧思。',svg:`
<svg viewBox="0 0 64 64" width="76" height="76">
  <path d="M42 24c-3-4-10-5-15-2-5 3-4 8 1 10l7 3c5 2 6 8 0 11-5 3-13 1-16-4" fill="none" stroke="#2dd4bf" stroke-width="4" stroke-linecap="round"/>
  <g fill="none" stroke="#fbbf24" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M40 22c2-3 2-7 1-10M40 18c3-1 5-3 6-6M44 26c3-2 6-2 9-1"/>
  </g>
</svg>`},

{tag:'几何多边形',title:'D7 · 低多边形鹿',desc:'low-poly 三角面拼出的鹿头,双色分面,现代科技插画感,精致且有设计张力。',svg:`
<svg viewBox="0 0 64 64" width="76" height="76">
  <g stroke="var(--bg)" stroke-width="1" stroke-linejoin="round">
    <path d="M32 50 24 34l8-4 8 4z" fill="#2dd4bf"/>
    <path d="M24 34l-2-10 10 6z" fill="#14b8a6"/>
    <path d="M40 34l2-10-10 6z" fill="#5eead4"/>
    <path d="M22 24l-4-10 6 4z" fill="#0d9488"/>
    <path d="M42 24l4-10-6 4z" fill="#0d9488"/>
    <path d="M32 30l-8 4 8 6 8-6z" fill="#22a3d6"/>
  </g>
</svg>`},

{tag:'跃动鹿身',title:'D8 · 奔跃全身鹿',desc:'一只跃起的完整鹿剪影,充满动势与活力,传达「敏捷 / 灵动」。适合更年轻的品牌气质。',svg:`
<svg viewBox="0 0 64 64" width="76" height="76">
  <path d="M12 44c4-2 6-6 8-11 2-4 5-7 10-7 3 0 5-2 6-5 1 3 2 5 5 5l-3 5c4 3 6 8 6 14l-4-1c-1-4-3-7-6-9-2 3-5 5-9 5-3 3-5 6-6 10l-4-1 3-6c-3 1-6 2-9 2z" fill="#2dd4bf"/>
  <g fill="none" stroke="#2dd4bf" stroke-width="2.4" stroke-linecap="round"><path d="M42 21c1-3 1-6 0-9M45 20c2-2 3-5 3-8"/></g>
</svg>`},

{tag:'圆章印记',title:'D9 · 圆形鹿印章',desc:'圆形边框 + 中央鹿头 + 环绕文字位,像藏书票 / 出版钢印,复古文艺、有仪式感。',svg:`
<svg viewBox="0 0 64 64" width="76" height="76">
  <circle cx="32" cy="32" r="26" fill="none" stroke="#2dd4bf" stroke-width="2"/>
  <circle cx="32" cy="32" r="21" fill="none" stroke="#2dd4bf" stroke-width="1" stroke-dasharray="2 3"/>
  <g fill="#2dd4bf">
    <path d="M32 40c-2 0-4-1-5-3l-2-5c2 1 4 1 7 1s5 0 7-1l-2 5c-1 2-3 3-5 3Z"/>
    <path d="M28 31c-3-2-4-5-4-9 2 2 4 3 5 4zM36 31c3-2 4-5 4-9-2 2-4 3-5 4z"/>
    <circle cx="32" cy="30" r="1.4"/>
  </g>
</svg>`},

{tag:'渐变弥散',title:'D10 · 弥散光鹿角',desc:'圆角方块内彩色弥散光晕 + 白色极简鹿角线稿,时髦柔和,类 iOS/Notion 新拟态审美。',svg:`
<svg viewBox="0 0 64 64" width="76" height="76">
  <defs>
    <linearGradient id="gd10" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2dd4bf"/><stop offset=".55" stop-color="#22a3d6"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient>
    <radialGradient id="sd10" cx=".3" cy=".22" r=".9"><stop offset="0" stop-color="#fff" stop-opacity=".5"/><stop offset="1" stop-color="#fff" stop-opacity="0"/></radialGradient>
  </defs>
  <rect x="6" y="6" width="52" height="52" rx="16" fill="url(#gd10)"/>
  <rect x="6" y="6" width="52" height="52" rx="16" fill="url(#sd10)"/>
  <g fill="none" stroke="#fff" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M32 48V34"/>
    <path d="M32 36c-5-2-8-6-9-12M32 34c5-2 8-6 9-12"/>
    <path d="M23 24c-3-1-5-3-6-6M41 24c3-1 5-3 6-6"/>
  </g>
</svg>`},
];

const grid = document.getElementById('grid');
grid.innerHTML = logos.map(l=>`
  <div class="card">
    <div class="stage">
      <div class="brandrow">${l.svg}<span class="name gname">Superbook</span></div>
    </div>
    <div class="meta">
      <span class="tag">${l.tag}</span>
      <div class="t">${l.title}</div>
      <div class="d">${l.desc}</div>
    </div>
  </div>`).join('');
</script>
</body>
</html>
